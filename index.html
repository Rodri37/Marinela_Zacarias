<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aniversário Marinela Zacarias</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    font-family:Arial,sans-serif;
}

/* Fundo dourado animado */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%,rgba(255,215,0,.15),transparent 40%),
    radial-gradient(circle at 80% 80%,rgba(255,215,0,.12),transparent 40%);
    animation:goldGlow 8s ease-in-out infinite alternate;
}

@keyframes goldGlow{
    from{transform:scale(1);}
    to{transform:scale(1.15);}
}

/* Partículas */

.particle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:gold;
    opacity:.7;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Estrelas */

.star{
    position:absolute;
    color:#FFD700;
    font-size:12px;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    0%,100%{
        opacity:.2;
        transform:scale(.8);
    }
    50%{
        opacity:1;
        transform:scale(1.4);
    }
}

/* Balões */

.balloon{
    position:absolute;
    bottom:-120px;
    width:50px;
    height:65px;
    background:linear-gradient(#ffe28a,#c89d28);
    border-radius:50%;
    animation:rise 15s linear infinite;
    opacity:.6;
}

.balloon::after{
    content:"";
    position:absolute;
    width:1px;
    height:60px;
    background:#c89d28;
    left:50%;
    top:65px;
}

@keyframes rise{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-130vh);
    }
}

/* Convite */

.container{
    position:relative;
    width:95vw;
    max-width:500px;
}

.invite{
    width:100%;
    display:block;
    border-radius:15px;
    box-shadow:0 0 35px rgba(255,215,0,.35);
    animation:floating 5s ease-in-out infinite;
}

@keyframes floating{
    0%,100%{
        transform:translateY(0) scale(1);
    }
    50%{
        transform:translateY(-8px) scale(1.01);
    }
}

/* Áreas invisíveis */

.hotspot{
    position:absolute;
    border-radius:50%;
    cursor:pointer;
    animation:pulse 2s infinite;
}

.hotspot::before{
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:50%;
    animation:vibrate .2s infinite alternate;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.06);
    }
}

@keyframes vibrate{
    from{
        transform:translateX(-1px);
    }
    to{
        transform:translateX(1px);
    }
}

/* Posição dos botões */

.whatsapp{
    width:75px;
    height:75px;
    left:34%;
    top:78%;
}

.location{
    width:75px;
    height:75px;
    left:56%;
    top:78%;
}

/* Efeito toque */

.touch-green{
    background:rgba(37,211,102,.45);
    box-shadow:0 0 30px #25D366;
}

.touch-red{
    background:rgba(234,67,53,.45);
    box-shadow:0 0 30px #EA4335;
}

/* Ripple */

.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple .6s linear;
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- Partículas -->

<script>
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(8+Math.random()*8)+"s";
document.body.appendChild(p);
}
</script>

<!-- Estrelas -->

<script>
for(let i=0;i<25;i++){
let s=document.createElement("div");
s.className="star";
s.innerHTML="✦";
s.style.top=Math.random()*25+"%";
s.style.left=(65+Math.random()*30)+"%";
s.style.animationDelay=Math.random()*3+"s";
document.body.appendChild(s);
}
</script>

<!-- Balões -->

<div class="balloon" style="left:5%;"></div>
<div class="balloon" style="left:25%;animation-delay:4s;"></div>
<div class="balloon" style="left:55%;animation-delay:8s;"></div>
<div class="balloon" style="left:80%;animation-delay:2s;"></div>

<div class="container">

<img src="convite.jpg" class="invite" alt="Convite">

<div class="hotspot whatsapp"></div>
<div class="hotspot location"></div>

</div>

<script>

const whatsapp =
document.querySelector(".whatsapp");

const locationBtn =
document.querySelector(".location");

/* ALTERE PELO LINK REAL */
const MAPS_LINK =
"https://maps.google.com";

/* WhatsApp */

whatsapp.addEventListener("click",function(e){

this.classList.add("touch-green");

ripple(e,this,"#25D366");

setTimeout(()=>{
this.classList.remove("touch-green");
},400);

window.open(
"https://wa.me/244930703565?text=Olá! Recebi o convite de aniversário e confirmo a minha presença.",
"_blank"
);

});

/* Localização */

locationBtn.addEventListener("click",function(e){

this.classList.add("touch-red");

ripple(e,this,"#EA4335");

setTimeout(()=>{
this.classList.remove("touch-red");
},400);

window.open(MAPS_LINK,"_blank");

});

function ripple(e,element,color){

let circle=document.createElement("span");

circle.className="ripple";

circle.style.background=color;

circle.style.width="20px";
circle.style.height="20px";

circle.style.left=
(e.offsetX-10)+"px";

circle.style.top=
(e.offsetY-10)+"px";

element.appendChild(circle);

setTimeout(()=>{
circle.remove();
},600);

}

</script>

</body>
</html>
